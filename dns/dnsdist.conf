------------------------------------------------
-- dnsdist 1.8.3 Production Configuration
-- nginx -> dnsdist DoH -> Unbound
------------------------------------------------

setSecurityPollSuffix("")
------------------------------------------------
-- DNS监听
-- 仅本机使用
------------------------------------------------

setLocal("127.0.0.1:5353")


------------------------------------------------
-- Unbound Backend
------------------------------------------------

unboundServer = newServer({
    address="127.0.0.1:53",
    name="unbound",
    checkInterval=10,
    checkTimeout=1000
})


------------------------------------------------
-- ACL
-- 防止直接公网访问dnsdist
------------------------------------------------

setACL({
    "127.0.0.1",
    "::1"
})


------------------------------------------------
-- EDNS透明
-- 保留DNSSEC/EDNS信息
------------------------------------------------

setECSOverride(false)


------------------------------------------------
-- 关闭查询日志
------------------------------------------------

setVerbose(false)


------------------------------------------------
-- DNS缓存
------------------------------------------------

pcache = newPacketCache(
    10000,
    {
        maxTTL=86400,
        minTTL=60
    }
)
getPool(""):setCache(pcache)

------------------------------------------------
-- 防攻击
------------------------------------------------

-- 单IP QPS限制
addAction(
    MaxQPSIPRule(100),
    DropAction()
)


-- TCP连接保护
setMaxTCPClientThreads(2)



------------------------------------------------
-- 控制台
------------------------------------------------

setConsoleACL({
    "127.0.0.1"
})


------------------------------------------------
-- DoH
--
-- 参数顺序:
-- 地址
-- 证书
-- 私钥
-- 路径
------------------------------------------------

addDOHLocal(
    "127.0.0.1:8053",
    "/etc/dnsdist/certs/cert.pem",
    "/etc/dnsdist/certs/key.pem",
    { "/dns-query" },
    {
        keepIncomingHeaders=true
    }
)
